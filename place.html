<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bangladesh</title>
    <link rel="stylesheet" href="styles/place.css">
    <script src="scripts/place.js" defer></script>
    <meta name="description" content="Life in Bangladesh … A HTML, CSS and Javascript Assignment from Hugh Roper">
    <meta name="author" content="Hugh Roper"> 
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:ital,wght@0,200..900;1,200..900&display=swap"
        rel="stylesheet">
</head>
<body>
    
    <header>
        <h1>Bangladesh</h1>
    </header>
                
    <main>

        <div class="hero">
            <picture>
                <source media="(max-width: 440px)" srcset="images/bangladesh-mobile.webp">
                <source media="(min-width: 441px)" srcset="images/bangladesh-hero.webp">
                <img src="images/bangladesh-hero.webp" alt="Landscape view of Bangladesh">
            </picture>
        </div>

        <section class="data">
            <h2>Data</h2>
            <table>
                <tbody>
                    <tr>
                        <th>Area:</th>
                        <td>57,320 sq mi</td>
                    </tr>
                    <tr>
                        <th>Population:</th>
                        <td>173,000,000</td>
                    </tr>
                    <tr>
                        <th>Capital:</th>
                        <td>Dhaka</td>
                    </tr>
                    <tr>
                        <th>Languages:</th>
                        <td>Bengali (official)</td>
                    </tr>
                    <tr>
                        <th>Currency:</th>
                        <td>Bangladeshi Taka</td>
                    </tr>
                    <tr>
                        <th>Time Zone:</th>
                        <td>UTC+6</td>
                    </tr>
                </tbody>
            </table>
        </section>

        <section class="weather">
 
            <h2>Weather</h2>
 
            <img src="images/clouds.svg" alt="Weather icon" class="weather-icon">

            <table>
                <tbody>
                    <tr>
                        <th>Temperature:</th>
                        <td><span id="temperature">30</span> °C</td>
                    </tr>
                    <tr>
                        <th>Conditions:</th>
                        <td>Partly Cloudy</td>
                    </tr>
                    <tr>
                        <th>Wind Speed:</th>
                        <td><span id="windSpeed">10</span> km/h</td>
                    </tr>
                    <tr>
                        <th>Wind Chill:</th>
                        <td><span id="windChill"></span></td>
                    </tr>
                </tbody>
            </table>

        </section>

    </main>

    <footer>
    
        <p>© <span id="currentYear"></span> <span class="separator">🌶️</span> Hugh Roper <span class="separator">🌶️</span>
            New Mexico</p>
        <p>Last Modified: <span id="lastModified"></span></p>
    
    </footer>

</body>
</html>
