    <main>

        <section>

            <h2>Squares</h2>

            <p>These planting grids show common square foot gardening spacing patterns. They help visualize how many plants or seeds can fit in one square foot.</p>

            <figure class="grid-item">
                <figcaption>1 per Square Foot</figcaption>
                <picture>
                    <img src="images/grid-1.png" alt="position to plant one seed in a square foot" loading="lazy" width="400">
                </picture>
            </figure>
            <figure class="grid-item">
                <figcaption>2 per Square Foot</figcaption>
                <picture>
                    <img src="images/grid-2.png" alt="position to plant two seeds in a square foot" loading="lazy">
                </picture>
            </figure>
            <figure class="grid-item">
                <figcaption>3 per Square Foot</figcaption>
                <picture>
                    <img src="images/grid-3.png" alt="position to plant three seeds in a square foot" loading="lazy">
                </picture>
            </figure>
            <figure class="grid-item">
                <figcaption>4 per Square Foot</figcaption>
                <picture>
                    <img src="images/grid-4.png" alt="position to plant four seeds in a square foot" loading="lazy">
                </picture>
            </figure>

        </section>

    </main>
