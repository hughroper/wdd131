<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Week 5 Form Assignment</title>
    <meta name="description" content="Week 5 Form Assignment - Product Review Form - WDD131">
    <meta name="author" content="Hugh Roper">
    <link href="styles/form.css" rel="stylesheet">
    <script src="scripts/form.js" defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:ital,wght@0,200..900;1,200..900&display=swap"
        rel="stylesheet">
</head>
<body>
    
    <header>

        <h1>Product Review</h1>
        
    </header>

    <main>

        <form class="product" method="get" action="review.html">

            <fieldset class="product-name">
                <label for="product-name">Product Name</label>
                <select id="product-name" name="productName" required>
                    <option value="" disabled selected>Select a Product… &nbsp; ⏷ </option>
                </select>
            </fieldset>

            <fieldset class="overall-rating">
                <div class="rating">Overall Rating </div>
                <label for="rating-one"><input type="radio" id="rating-one" name="overallRating" value="1" required>★ </label>
                <label for="rating-two"><input type="radio" id="rating-two" name="overallRating" value="2" required>★★ </label>
                <label for="rating-three"><input type="radio" id="rating-three" name="overallRating" value="3" required>★★★ </label>
                <label for="rating-four"><input type="radio" id="rating-four" name="overallRating" value="4" required>★★★★ </label>
                <label for="rating-five"><input type="radio" id="rating-five" name="overallRating" value="5" required>★★★★★ </label>
            </fieldset>
            
            <fieldset class="date-installation">
                <label for="date-of-installation">Date of Installation</label>
                <input type="date" id="date-of-installation" name="dateOfInstallation" required>
            </fieldset>
            
            <fieldset class="product-features">
                <div class="features">Which features did you find useful in the product?
                <span>(Check all that apply)</span></div>
                <label for="durability"><input type="checkbox" id="durability" name="features"> Durability</label>
                <label for="ease-of-use"><input type="checkbox" id="ease-of-use" name="features"> Ease of Use</label>
                <label for="performance"><input type="checkbox" id="performance" name="features"> Performance</label>
                <label for="design"><input type="checkbox" id="design" name="features"> Design</label>
            </fieldset>
            
            <fieldset class="review">
                <label for="written-review">Written Review <span>(Optional)</span></label>
                <textarea id="written-review" name="writtenReview"></textarea>
            </fieldset>
            
            <fieldset class="user-name">
                <label for="name">Your Name <span>(Optional)</span></label>
                <input type="text" id="name" name="name">
            </fieldset>
            
            <fieldset class="submit">
                <input type="submit" value="Post Review">
            </fieldset>
            


        </form>

    </main>

    <footer>
    
        <p>© <span id="currentYear"></span> <span class="separator">🌶️</span> Hugh Roper <span class="separator">🌶️</span>
            New Mexico</p>
        <p>Last Modified: <span id="lastModified"></span></p>
    
    </footer>



</body>
</html>
